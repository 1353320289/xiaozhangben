<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="工货日历">
    <title>工货日历</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css?v=26">
  </head>
  <body>
    <div class="app-shell">
      <main id="authView" class="auth-view">
        <section class="auth-card">
          <h1>做货账本</h1>
          <p>账户由管理员创建，登录后记录会保存到云端。</p>
          <form id="authForm">
            <label>
              <span>邮箱</span>
              <input id="emailInput" type="email" autocomplete="email" placeholder="邮箱" required>
            </label>
            <label>
              <span>密码</span>
              <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码" required>
            </label>
            <button class="primary-button" id="loginBtn" type="submit">登录</button>
          </form>
          <p id="authStatus" class="auth-status"></p>
        </section>
      </main>

      <main id="appView" hidden style="display: none;">
        <section class="work-board" aria-label="工货日历">
          <div class="account-row">
            <span id="accountLabel">未登录</span>
            <span id="syncStatus">本机</span>
            <button class="logout-button" id="logoutBtn" type="button">退出</button>
          </div>
          <div class="month-tools">
            <button class="icon-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
            <div class="month-title">
              <h1 id="calendarTitle">2026年5月</h1>
              <span id="monthLabel">本月总计</span>
            </div>
            <button class="icon-button" id="nextMonth" type="button" aria-label="下个月">›</button>
          </div>

          <div class="total-row">
            <strong id="monthTotal">¥0.00</strong>
            <span><b id="workDays">0 天</b>上班</span>
            <span><b id="dayTotal">¥0.00</b>当天</span>
          </div>

          <div class="week-row" aria-hidden="true">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section class="entry-panel" aria-label="当天做货">
          <div class="day-head">
            <h2 id="selectedDateTitle">今天</h2>
            <div class="day-tools">
              <span id="selectedDateTotal">¥0.00</span>
              <button class="report-button" id="reportBtn" type="button">报告</button>
              <button class="trash-button" id="trashBtn" type="button">回收站</button>
            </div>
          </div>

          <form id="workForm">
            <label class="goods-field">
              <span>货名</span>
              <input id="goodsInput" autocomplete="off" maxlength="30" placeholder="做了什么货" required>
            </label>
            <label>
              <span>每打单价</span>
              <input id="priceInput" inputmode="decimal" autocomplete="off" placeholder="单价" required>
            </label>
            <label>
              <span>打数</span>
              <input id="dozenInput" inputmode="decimal" autocomplete="off" placeholder="打数">
            </label>
            <label>
              <span>闪数</span>
              <input id="looseInput" inputmode="decimal" autocomplete="off" placeholder="闪数">
            </label>
            <button class="primary-button" type="submit">保存</button>
          </form>

          <div id="emptyState" class="empty-state">这天还没有记录。</div>
          <ul id="workList" class="work-list"></ul>
        </section>
      </main>

      <main id="reportView" hidden style="display: none;">
        <section class="report-page" aria-label="生成报告">
          <div class="report-head">
            <h1>本月报告</h1>
            <button class="close-button" id="closeReportBtn" type="button">返回</button>
          </div>
          <div class="report-image-wrap">
            <canvas id="reportCanvas" aria-label="报告图片"></canvas>
            <img id="reportImage" alt="报告图片">
          </div>
        </section>
      </main>

      <button class="install-button" id="installBtn" type="button" hidden>安装</button>
    </div>

    <script src="vendor/supabase.min.js?v=26" defer></script>
    <script src="app.js?v=26" defer></script>
  </body>
</html>
