<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="工货日历">
    <title>工货日历</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">每天做货收益</p>
          <h1>工货日历</h1>
        </div>
        <button class="install-button" id="installBtn" type="button" hidden>安装</button>
      </header>

      <main>
        <section class="summary-panel" aria-label="本月总计">
          <div>
            <p id="monthLabel">本月总计</p>
            <strong id="monthTotal">¥0.00</strong>
          </div>
          <div class="summary-side">
            <span>上班天数</span>
            <strong id="workDays">0 天</strong>
            <span>选中日期</span>
            <strong id="dayTotal">¥0.00</strong>
          </div>
        </section>

        <section class="calendar-panel" aria-label="收益日历">
          <div class="month-tools">
            <button class="icon-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
            <h2 id="calendarTitle">2026年5月</h2>
            <button class="icon-button" id="nextMonth" type="button" aria-label="下个月">›</button>
          </div>
          <div class="week-row" aria-hidden="true">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section class="entry-panel" aria-label="当天做货">
          <div class="section-title">
            <h2 id="selectedDateTitle">今天</h2>
            <span id="selectedDateTotal">¥0.00</span>
          </div>

          <form id="workForm">
            <label class="wide">
              做了什么货
              <input id="goodsInput" autocomplete="off" maxlength="30" placeholder="例如：外壳、线束、包装" required>
            </label>
            <label>
              单价
              <input id="priceInput" inputmode="decimal" autocomplete="off" placeholder="0.00" required>
            </label>
            <label>
              数量
              <input id="qtyInput" inputmode="decimal" autocomplete="off" value="1" required>
            </label>
            <button class="primary-button" type="submit">保存到这一天</button>
          </form>

          <div id="emptyState" class="empty-state">这天还没有记录。</div>
          <ul id="workList" class="work-list"></ul>
        </section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
