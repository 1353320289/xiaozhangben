<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="工货日历">
    <title>工货日历</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <main>
        <section class="work-board" aria-label="工货日历">
          <div class="month-tools">
            <button class="icon-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
            <div class="month-title">
              <h1 id="calendarTitle">2026年5月</h1>
              <span id="monthLabel">本月总计</span>
            </div>
            <button class="icon-button" id="nextMonth" type="button" aria-label="下个月">›</button>
          </div>

          <div class="total-row">
            <strong id="monthTotal">¥0.00</strong>
            <span><b id="workDays">0 天</b>上班</span>
            <span><b id="dayTotal">¥0.00</b>当天</span>
          </div>

          <div class="week-row" aria-hidden="true">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section class="entry-panel" aria-label="当天做货">
          <div class="day-head">
            <h2 id="selectedDateTitle">今天</h2>
            <div class="day-tools">
              <span id="selectedDateTotal">¥0.00</span>
              <button class="trash-button" id="trashBtn" type="button">回收站</button>
            </div>
          </div>

          <form id="workForm">
            <label class="goods-field">
              <span>货名</span>
              <input id="goodsInput" autocomplete="off" maxlength="30" placeholder="做了什么货" required>
            </label>
            <label>
              <span>每打单价</span>
              <input id="priceInput" inputmode="decimal" autocomplete="off" placeholder="单价/打" required>
            </label>
            <label>
              <span>一打数量</span>
              <input id="bundleInput" inputmode="decimal" autocomplete="off" placeholder="一打数" value="12" required>
            </label>
            <label>
              <span>打数</span>
              <input id="dozenInput" inputmode="decimal" autocomplete="off" placeholder="打数">
            </label>
            <label>
              <span>散数</span>
              <input id="looseInput" inputmode="decimal" autocomplete="off" placeholder="散数">
            </label>
            <button class="primary-button" type="submit">保存</button>
          </form>

          <div id="emptyState" class="empty-state">这天还没有记录。</div>
          <ul id="workList" class="work-list"></ul>
        </section>
      </main>
      <button class="install-button" id="installBtn" type="button" hidden>安装</button>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
